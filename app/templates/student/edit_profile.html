{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-person-circle me-2"></i>Edit Student Profile</h2>
<a href="{{ url_for('student.profile') }}" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left-circle me-1"></i>Back to Profile</a>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="POST">
      
      <!-- Personal Info -->
      <h5 class="mb-3 text-primary"><i class="bi bi-info-circle me-1"></i>Personal Information</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="full_name" class="form-label">Full Name *</label>
          <input type="text" class="form-control" id="full_name" name="full_name" value="{{ profile.full_name }}" required>
        </div>
        <div class="col-md-6">
          <label for="roll_number" class="form-label">Roll Number *</label>
          <input type="text" class="form-control" id="roll_number" name="roll_number" value="{{ profile.roll_number }}" required readonly>
        </div>
      </div>

      <!-- Academic Info -->
      <h5 class="mb-3 text-primary"><i class="bi bi-mortarboard-fill me-1"></i>Academic Details</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="department" class="form-label">Department *</label>
          <select class="form-select" id="department" name="department" required>
            {% for dept in ['Computer Science', 'Information Technology', 'Electronics', 'Electrical', 'Mechanical', 'Civil', 'Other'] %}
              <option value="{{ dept }}" {% if profile.department == dept %}selected{% endif %}>{{ dept }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label for="year" class="form-label">Year of Study</label>
          <select class="form-select" id="year" name="year">
            {% for y in range(1,5) %}
              <option value="{{ y }}" {% if profile.year == y %}selected{% endif %}>{{ y }}{{ ['st','nd','rd','th'][y-1] }} Year</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label for="cgpa" class="form-label">CGPA</label>
          <input type="number" step="0.01" min="0" max="10" class="form-control" id="cgpa" name="cgpa" value="{{ profile.cgpa or '' }}">
        </div>
        <div class="col-md-4">
          <label for="tenth_marks" class="form-label">10th Marks (%)</label>
          <input type="number" step="0.01" min="0" max="100" class="form-control" id="tenth_marks" name="tenth_marks" value="{{ profile.tenth_marks or '' }}">
        </div>
        <div class="col-md-4">
          <label for="twelfth_marks" class="form-label">12th Marks (%)</label>
          <input type="number" step="0.01" min="0" max="100" class="form-control" id="twelfth_marks" name="twelfth_marks" value="{{ profile.twelfth_marks or '' }}">
        </div>
      </div>

      <!-- Contact Info -->
      <h5 class="mb-3 text-primary"><i class="bi bi-telephone-fill me-1"></i>Contact Information</h5>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" name="phone" value="{{ profile.phone or '' }}">
        </div>
        <div class="col-md-6">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="dob" name="dob" value="{{ profile.dob.strftime('%Y-%m-%d') if profile.dob else '' }}">
        </div>
      </div>

      <!-- Address & Skills -->
      <h5 class="mb-3 text-primary"><i class="bi bi-geo-alt-fill me-1"></i>Address & Skills</h5>
      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea class="form-control" id="address" name="address" rows="2">{{ profile.address or '' }}</textarea>
      </div>
      <div class="mb-4">
        <label for="skills" class="form-label">Skills</label>
        <textarea class="form-control" id="skills" name="skills" rows="2" placeholder="e.g., Python, Java, SQL, Data Analysis">{{ profile.skills or '' }}</textarea>
      </div>

      <!-- Actions -->
      <div class="d-flex justify-content-end gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Changes</button>
        <a href="{{ url_for('student.profile') }}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
